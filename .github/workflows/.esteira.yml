name: Esteira Inquebrável

on:
  push:
    branches:
      - main

jobs:
  validar-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install htmlhint
        run: npm install -g htmlhint
      - name: Validate HTML
        run: htmlhint index.html

  validar-css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Validate CSS exists
        run: |
          test -f src/index.css && echo "CSS encontrado!" || (echo "ERRO: CSS não encontrado!" && exit 1)
          test -s src/index.css && echo "CSS não está vazio!" || (echo "ERRO: CSS está vazio!" && exit 1)
          echo "Validação CSS concluída!"

  preparar-entrega:
    runs-on: ubuntu-latest
    needs: [validar-html, validar-css]
    steps:
      - uses: actions/checkout@v3
      - name: Criar pasta dist
        run: |
          mkdir dist
          cp index.html dist/
          cp *.css dist/
          echo "Entrega preparada com sucesso!"