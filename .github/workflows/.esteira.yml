name: Esteira Inquebrável

on:
  push:
    branches:
      - main

jobs:
  validar-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install htmlhint
        run: npm install -g htmlhint
      - name: Validate HTML
        run: htmlhint index.html

  validar-css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install stylelint
        run: npm install -g stylelint stylelint-config-standard
      - name: Validate CSS
        run: stylelint "**/*.css"

  preparar-entrega:
    runs-on: ubuntu-latest
    needs: [validar-html, validar-css]
    steps:
      - uses: actions/checkout@v3
      - name: Criar pasta dist
        run: |
          mkdir dist
          cp index.html dist/
          cp *.css dist/
          echo "Entrega preparada com sucesso!"